# Publishes this repository to GitHub Pages whenever main changes,
# so the apps are playable at:
#   https://jerseyjon.github.io/my-first-app/            (to-do list)
#   https://jerseyjon.github.io/my-first-app/wordle.html (Margie's Wordle)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Enable and configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload the site (the whole repo — it's all static files)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
